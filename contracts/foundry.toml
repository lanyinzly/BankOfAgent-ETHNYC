[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
# DeployBoA.s.sol writes ./deployments.json after broadcasting.
fs_permissions = [{ access = "read-write", path = "./" }]

# Convenience RPC aliases. Override URLs with env if set.
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
sepolia = "${ETH_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111, url = "https://api-sepolia.etherscan.io/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
